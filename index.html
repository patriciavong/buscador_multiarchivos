<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador Local de Documentos</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="container">
        <h1>Buscador Local de Documentos</h1>
        
        <!-- Zona de carga: El CSS la hará verse como una caja grande -->
        <section class="upload-section" id="dropZone">
            <div class="upload-content">
                <div class="upload-icon">📂</div>
                <p><strong>Arrastra tus archivos aquí</strong></p>
                <p class="secondary-text">o haz clic para seleccionar</p>
                <span class="formats">(.txt, .pdf, .docx, .xlsx)</span>
            </div>
            <!-- Este input queda oculto pero se activa al hacer clic en el cuadro -->
            <input type="file" id="fileInput" multiple accept=".txt,.pdf,.docx,.xlsx">
        </section>

        <!-- Sección para gestionar archivos cargados -->
        <section id="fileListContainer" class="file-list-container">
            <h3>Archivos cargados:</h3>
            <div id="fileThumbnails" class="file-thumbnails">
                <!-- Aquí JavaScript dibujará los archivos con su "X" para borrar -->
            </div>
        </section>

        <section class="search-section">
            <input type="text" id="searchInput" placeholder="Escribe tu búsqueda aquí y presiona Enter...">
            <button id="searchBtn">Buscar</button>
        </section>

        <hr>

        <section class="results-section">
            <h2>Resultados de la búsqueda</h2>
            <div id="resultsList">
                <p class="placeholder-text">Carga archivos y escribe algo para ver las coincidencias.</p>
            </div>
        </section>
    </div>

    <!-- LIBRERÍAS LOCALES -->
    <script src="librerias/pdf.min.js"></script>
    <script src="librerias/mammoth.browser.min.js"></script>
    <script src="librerias/xlsx.full.min.js"></script>

    <!-- Lógica principal -->
    <script src="app.js"></script>
</body>
</html>
